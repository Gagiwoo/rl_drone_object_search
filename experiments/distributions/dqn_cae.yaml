# CAE-based DQN configuration
DroneGridEnv-v0:
  # Training parameters
  n_timesteps: 1000000
  n_envs: 12
  
  # DQN hyperparameters
  batch_size: 128
  buffer_size: 50000
  learning_rate: 3.0e-05
  learning_starts: 25000
  gamma: 0.95
  tau: 0.005
  train_freq: 12
  gradient_steps: 128
  target_update_interval: 1
  
  # Exploration
  exploration_fraction: 1.0
  exploration_initial_eps: 0.0
  exploration_final_eps: 0.0
  
  # Policy configuration (CAE-based)
  policy: sb3_custom.policies.LocalGlobalCAEPolicy  
  policy_kwargs:
    features_extractor_kwargs:
      cae_model_path: 'models/cae_pretrained.pth'
      latent_dim: 512
      freeze_cae: true
      # Local map CNN config 
      config:
        local_map:
          conv_kernel_size: 5
          conv_kernels_num: 16
          conv_layer_num: 2
    net_arch:
      - 256
      - 256
      - 256
    optimizer_kwargs:
      amsgrad: true
    softmax_scaling: 0.1
  
  # Environment wrapper
  env_wrapper:
    - drone_grid_env.wrappers.EpisodeInfoBufferWrapper
  
  # Callbacks
  callback:
    - sb3_custom.callbacks.ModelSummaryCallback
    - sb3_custom.callbacks.EpisodeInfoLoggerCallback
    - sb3_custom.callbacks.CustomWandbCallback
    - sb3_custom.callbacks.RecordVideoCallback:
        video_path: training/cae_experiments/
        deterministic: false
        fallback_env: DroneGridEnv-v0
        fallback_env_kwargs:
          config_file: experiments/distributions/env_config_random.yaml
        n_video_episodes: 3
        save_individual_episodes: true
        record_freq: 50000
        seed: 1234
        verbose: true
    - sb3_custom.callbacks.EvaluationCallback:
        best_model_save_path: training/cae_experiments/
        last_model_save_path: training/cae_experiments/
        log_path: training/cae_experiments/
        deterministic: false
        eval_freq: 10000
        fallback_env: DroneGridEnv-v0
        fallback_env_kwargs:
          config_file: experiments/distributions/env_config_random.yaml
        n_eval_envs: 12
        n_eval_episodes: 10
        seed: 1234
        vec_env_class: subproc
